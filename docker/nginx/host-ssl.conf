# Host-level nginx config for api.tryargus.cloud
# Install on VM at: /etc/nginx/sites-available/argus-api
#
# After Certbot runs, it will auto-add the SSL directives.

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name api.tryargus.cloud;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — proxy to Docker nginx on localhost:8080
server {
    listen 443 ssl;
    server_name api.tryargus.cloud;

    # Certbot will populate these:
    ssl_certificate     /etc/letsencrypt/live/api.tryargus.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.tryargus.cloud/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy to Docker nginx
    location / {
        proxy_pass http://127.0.0.1:8080;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Match Docker nginx timeouts
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering     off;

        # Ingest payloads
        client_max_body_size 50m;
    }
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
